<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - TV4C</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="assets/images/logo.png">
</head>

<body>
    <!-- 1. Top Header -->
    <header class="top-header">
        <div class="container flex justify-between items-center">
            <a href="index.html" class="logo">
                <img src="assets/images/logo.png" alt="TV4C Logo">
            </a>
            <div class="header-right flex items-center gap-6">
                <div class="hotline flex items-center gap-2 text-primary font-bold">
                    <i class="fa-solid fa-phone-volume"></i>
                    <div>
                        <span class="block text-xs text-gray">Hỗ trợ độc giả:</span>
                        <span class="text-lg">024.37627819</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="section" style="padding: var(--space-8) 0; min-height: 80vh; background: #f3f4f6;">
        <div class="container">
            <div class="auth-wrapper">
                <div class="auth-card">
                    <div class="auth-header">
                        <h2>Quên mật khẩu?</h2>
                        <p>Nhập email của bạn để lấy lại mật khẩu</p>
                    </div>

                    <form class="auth-form active">
                        <div class="form-group">
                            <label class="form-label" for="email">Email đã đăng ký</label>
                            <input type="email" id="email" class="form-input" placeholder="Nhập email của bạn..."
                                required>
                        </div>

                        <button type="submit" class="btn btn-primary auth-submit-btn">Gửi yêu cầu</button>
                    </form>

                    <div class="auth-footer">
                        <p>Quay lại <a href="login.html">Đăng nhập</a></p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer-simple" style="background: #1e3a8a; padding: 20px 0; border-top: 4px solid #2563eb;">
        <div class="container text-center">
            <p class="footer-copyright text-white text-sm opacity-80">© 2026 TV4C - Thư Viện Điện Tử Cộng Đồng. All
                rights reserved.</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>

</html>
