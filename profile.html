<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tài khoản - TV4C</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="assets/images/logo.png">
</head>

<body>
    <!-- Top Header & Navbar (Reused) -->
    <header class="top-header">
        <div class="container flex justify-between items-center">
            <a href="index.html" class="logo"><img src="assets/images/logo.png" alt="TV4C Logo"></a>
            <div class="header-right flex items-center gap-6">
                <div class="hotline flex items-center gap-2 text-primary font-bold">
                    <i class="fa-solid fa-phone-volume"></i> <span>024.37627819</span>
                </div>
                <div class="user-actions flex gap-3">
                    <a href="profile.html?tab=saved" class="icon-btn" title="Tủ sách đã lưu"><i
                            class="fa-regular fa-bookmark"></i></a>
                    <a href="profile.html?tab=favorites" class="icon-btn" title="Yêu thích"><i
                            class="fa-regular fa-heart"></i></a>
                    <div class="user-dropdown-container">
                        <a href="profile.html" class="icon-btn user-btn"><i class="fa-regular fa-user"></i></a>
                        <div class="user-menu-dropdown">
                            <a href="profile.html"><i class="fa-solid fa-circle-info"></i> Thông tin tài khoản</a>
                            <a href="profile.html?tab=password"><i class="fa-solid fa-key"></i> Thay đổi mật khẩu</a>
                            <a href="login.html" class="text-red"><i class="fa-solid fa-right-from-bracket"></i> Đăng
                                xuất</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>
    <nav class="main-navbar">
        <div class="container flex items-center justify-between h-full">
            <div class="nav-left"><button class="cat-trigger-btn"><i class="fa-solid fa-bars"></i> <span>DANH MỤC THƯ
                        VIỆN</span></button></div>
            <div class="nav-center flex-1 mx-8">
                <div class="search-box">
                    <select class="search-select">
                        <option>Sách bản quyền</option>
                    </select>
                    <input type="text" placeholder="Tìm kiếm..." class="search-input">
                    <button class="search-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
                </div>
            </div>
            <div class="nav-right">
                <ul class="nav-links flex gap-6">
                    <li><a href="#">Thông tin chung</a></li>
                    <li><a href="news.html">Tin tức</a></li>
                    <li><a href="#">Hướng dẫn</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="section bg-gray-50">
        <div class="container">
            <div class="breadcrumb"><a href="index.html">Trang chủ</a> <i class="fa-solid fa-chevron-right"></i> <span
                    class="text-primary">Tài khoản</span></div>

            <div class="flex gap-8 mt-6">
                <!-- Sidebar Tabs -->
                <div class="profile-tabs">
                    <a href="#" class="profile-tab-item active"><i class="fa-solid fa-circle-info"></i> Thông tin tài
                        khoản</a>
                    <a href="#" class="profile-tab-item"><i class="fa-solid fa-book-open"></i> Sách đang đọc</a>
                    <a href="#" class="profile-tab-item"><i class="fa-solid fa-heart"></i> Tủ sách yêu thích</a>
                    <a href="#" class="profile-tab-item"><i class="fa-solid fa-bookmark"></i> Sách đã lưu</a>
                    <a href="#" class="profile-tab-item"><i class="fa-solid fa-key"></i> Đổi mật khẩu</a>
                    <div class="divider my-2 border-t"></div>
                    <a href="login.html" class="profile-tab-item text-red"><i
                            class="fa-solid fa-right-from-bracket"></i> Đăng xuất</a>
                </div>

                <!-- Content Area -->
                <div class="flex-1 bg-white p-8 rounded shadow-sm">
                    <h2 class="text-xl font-bold mb-6 pb-2 border-b">Thông tin cá nhân</h2>
                    <form class="grid grid-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray mb-1">Họ và tên</label>
                            <input type="text" value="Nguyen Van A" class="w-full p-2 border rounded bg-gray-50">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray mb-1">Email</label>
                            <input type="email" value="nguyenvana@gmail.com"
                                class="w-full p-2 border rounded bg-gray-50" readonly>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray mb-1">Số điện thoại</label>
                            <input type="text" value="0912345678" class="w-full p-2 border rounded bg-gray-50">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray mb-1">Ngày sinh</label>
                            <input type="date" value="1995-01-01" class="w-full p-2 border rounded bg-gray-50">
                        </div>
                        <div class="col-span-2">
                            <label class="block text-sm font-medium text-gray mb-1">Địa chỉ</label>
                            <input type="text" value="Số 10, Đường ABC, Quận XYZ, Hà Nội"
                                class="w-full p-2 border rounded bg-gray-50">
                        </div>
                        <div class="col-span-2 mt-4">
                            <button class="btn btn-primary px-6 py-2 rounded">Cập nhật thông tin</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer Simple -->
    <footer class="footer-simple" style="background: #1e3a8a; padding: 20px 0; border-top: 4px solid #2563eb;">
        <div class="container text-center">
            <p class="footer-copyright text-white text-sm opacity-80">© 2026 TV4C. All rights reserved.</p>
        </div>
    </footer>
</body>

</html>
